<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <!-- Default font for the ja_JP locale (no fc-match pattern) -->
  <match>
    <test compare="contains" name="lang">
      <string>ja</string>
    </test>
    <edit mode="prepend" name="family">
      <string>IBMPlexSansJP</string>
    </edit>
  </match>

  <!-- Serif -->
  <match>
    <test name="family">
      <string>serif</string>
    </test>
    <edit mode="assign" name="family">
      <string>IBMPlexSerif</string>
    </edit>
  </match>

  <!-- Sans -->
  <match>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit mode="assign" name="family">
      <string>IBMPlexSans</string>
    </edit>
  </match>

  <!-- Monospace -->
  <match>
    <test name="family">
      <string>monospace</string>
    </test>
    <edit mode="assign" name="family">
      <string>IBMPlexMono</string>
    </edit>
  </match>

  <match>
    <test name="family">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="assign">
      <string>IBMPlexSansJP</string>
    </edit>
  </match>

</fontconfig>


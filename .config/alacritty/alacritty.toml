[general]
import = [ "~/.config/alacritty/themes/current" ]
live_config_reload = true

[window]
dimensions = { columns = 96, lines = 32 }
padding = { x = 0, y = 0 }
dynamic_title = true

[scrolling]
history = 10000

[font]
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }
size = 11

[cursor]
# shape = Block | Beam
style = { shape = "Block", blinking = "Always" }

